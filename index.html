<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="خطك اليوم · Day Plan — فريق دكتور أحمد عبد السلام">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2BA0AA">

  <!-- iOS add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="خطك اليوم">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>خطك اليوم · Day Plan</title>

  <style>
    html, body { margin:0; padding:0; height:100%; }
    #loading {
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#2BA0AA; transition:opacity .5s ease; font-family:sans-serif;
    }
    #loading img { width:190px; max-width:62%; height:auto; }
    #loading .spin {
      margin-top:26px; width:34px; height:34px; border-radius:50%;
      border:3px solid rgba(255,255,255,.35); border-top-color:#fff;
      animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading.hide { opacity:0; pointer-events:none; }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/Icon-512.png" alt="Dr Ahmed Abdel Salam">
    <div class="spin"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('hide'); setTimeout(function(){ el.remove(); }, 600); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
